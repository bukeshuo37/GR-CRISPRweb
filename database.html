{% extends "base.html" %}
{% block content %}
<h2>🔍 Database Search</h2>

<div class="search-bar">
    <div style="flex: 1; min-width: 200px;">
        <div style="margin-bottom: 5px; font-size: 14px; color: #666; font-weight: bold;">OMIM ID</div>
        <input id="omim" placeholder="Enter OMIM ID" value="618278" style="width: 100%; color: #999;">
    </div>
    <div style="flex: 2; min-width: 400px;">
        <div style="margin-bottom: 5px; font-size: 14px; color: #666; font-weight: bold;">Mutation Information</div>
        <input id="mutation" placeholder="Enter Mutation Information" value="NM_198514.4(NHLRC2):c.1013C>T (p.Pro338Leu)" style="width: 100%; color: #999;">
    </div>
    <div class="mode-selector">
        <label><input type="radio" name="mode" value="cas9" checked>🧬 CRISPR/Cas9</label>
        <label><input type="radio" name="mode" value="be">🧬 Base Editors (BEs)</label>
    </div>
    <div style="flex: 1; min-width: 150px;">
        <div style="margin-bottom: 5px; font-size: 14px; color: #666; font-weight: bold;">Editor</div>
        <select id="editor" style="width: 100%;"></select>
    </div>
    <div style="flex: 1; min-width: 300px; width: 100%;">
        <div style="margin-bottom: 5px; font-size: 14px; color: #666; font-weight: bold;">Sort</div>
        <select id="sort_by" style="width: 100%; min-width: 300px;"></select>
    </div>
    <button onclick="search()" style="flex-shrink: 0;">🔍 Search</button>
</div>

<div id="result" style="min-height: 200px;">
    <p style="color:#888;">Please enter disease information to get prediction results</p>
    <p style="color:#888;">(Please wait a few minutes when loading data for the first time)</p>
</div>
{% endblock %}
